<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traduttore Pro — Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
</head>

<body class="admin-body">

    <!-- navigation -->
    <nav class="nav">
        <div class="nav-brand">
            <span class="nav-logo">Traduttore Pro</span>
            <span class="nav-tagline">Admin Panel</span>
        </div>
        <div class="nav-right" id="navRight">
            <span class="nav-admin-badge">Restricted Access</span>
        </div>
    </nav>

    <!-- login page -->
    <div id="loginPage">
        <div class="login-wrap">
            <div class="login-card">
                <div class="login-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </div>
                <h1 class="login-title">Admin Access</h1>
                <p class="login-sub">Restricted to authorized personnel only</p>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input class="form-input" type="text" id="loginUsername" placeholder="Enter username" />
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" />
                </div>
                <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
                <p class="login-error" id="loginError">Invalid credentials. Please try again.</p>
            </div>
        </div>
    </div>

    <!-- dashboard -->
    <div id="dashboardPage" style="display:none">
        <div class="dashboard">

            <!-- dashboard header -->
            <div class="dash-header">
                <div>
                    <h2 class="dash-title">Translation Requests</h2>
                    <p class="dash-sub">Manage and respond to all incoming client requests</p>
                </div>
                <div class="dash-header-right">
                    <span class="dash-date" id="dashDate"></span>
                    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
                </div>
            </div>

            <!-- stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total</div>
                    <div class="stat-num" id="statTotal">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending</div>
                    <div class="stat-num stat-gray" id="statPending">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Approved</div>
                    <div class="stat-num stat-green" id="statApproved">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Rejected</div>
                    <div class="stat-num stat-red" id="statRejected">0</div>
                </div>
            </div>

            <!-- filter tabs -->
            <div class="tabs" id="tabs">
                <button class="tab active" data-filter="all">All</button>
                <button class="tab" data-filter="Arabic → Italian">Arabic → Italian</button>
                <button class="tab" data-filter="Italian → Arabic">Italian → Arabic</button>
                <button class="tab" data-filter="French → Italian">French → Italian</button>
                <button class="tab" data-filter="English → Italian">English → Italian</button>
            </div>

            <!-- pending requests -->
            <div class="section-label">Pending Requests</div>
            <div id="pendingList"></div>

            <!-- resolved requests -->
            <div class="section-label" style="margin-top:2rem">Approved & Rejected</div>
            <div id="resolvedList"></div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='admin.js') }}"></script>
</body>

</html>
